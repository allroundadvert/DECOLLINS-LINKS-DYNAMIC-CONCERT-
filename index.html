<style>
body{
  margin:0;
  font-family:Segoe UI, Arial, sans-serif;
  background:#0a0a0a;
  color:#f5f5f5;
}
:root{--gold:#d4af37}

/* HEADER */
.hero{
  display:flex;
  justify-content:center;
  align-items:center;
  width:100%;
  max-height:320px;
  border-bottom:4px solid var(--gold);
}
.hero img{
  max-width:100%;
  max-height:320px;
  object-fit:contain;
}

/* TOP TEXT */
.top-text{
  text-align:center;
  padding:15px;
  font-weight:700;
  color:var(--gold);
}

/* INFO */
.info{
  text-align:center;
  padding:20px 15px;
}
.info h2{color:var(--gold);}

/* MOVING IMAGES */
.moving-wrap{
  overflow:hidden;
  max-width:1100px;
  margin:30px auto;
}
.moving-track{
  display:flex;
  animation:slide 8s linear infinite;
}
.moving-track img{
  width:50%;
  height:250px;
  object-fit:cover;
}
@keyframes slide{
  0%{transform:translateX(0);}
  50%{transform:translateX(-50%);}
  100%{transform:translateX(0);}
}

/* GALLERY */
.gallery{
  max-width:1100px;
  margin:20px auto;
  display:grid;
  grid-template-columns:repeat(2,1fr);
  gap:10px;
}
.gallery img{
  width:100%;
  height:220px;
  object-fit:cover;
}

/* FORM */
.form-box{
  max-width:750px;
  margin:50px auto;
  padding:30px;
  border:1px solid rgba(212,175,55,.5);
  background:#050505;
}
.form-box h2{
  color:var(--gold);
  text-align:center;
}

.order-box label{
  display:block;
  margin-top:10px;
}

input{
  width:100%;
  padding:12px;
  margin-top:10px;
  background:#0c0c0c;
  border:1px solid #333;
  color:#fff;
}

button{
  margin-top:25px;
  width:100%;
  padding:16px;
  background:linear-gradient(90deg,#d4af37,#f1d27a);
  border:none;
}

/* MAP */
.map{
  max-width:1100px;
  margin:40px auto;
}
.map iframe{
  width:100%;
  height:350px;
}

/* FLOAT BUTTONS */
.whatsapp,.call{
  position:fixed;
  right:18px;
  padding:14px;
  border-radius:40px;
  color:#fff;
  text-decoration:none;
}
.whatsapp{bottom:90px;background:#25d366}
.call{bottom:30px;background:#2563eb}

footer{
  text-align:center;
  padding:20px;
}
</style>

<h2>Place Your Order</h2>

<form onsubmit="send();return false;">
<input id="customerName" placeholder="Name">

<div id="products">
<label><input type="checkbox" value="Water pumping machine"> Water pumping machine</label>
<label><input type="checkbox" value="PVC fittings"> PVC fittings</label>
<label><input type="checkbox" value="Pipes"> Pipes</label>

<label><input type="checkbox" value="Street lights"> Street lights</label>
<label><input type="checkbox" value="Inverter batteries"> Inverter batteries</label>
</div>

<input id="customerAddress" placeholder="Address">

<a class="call" href="tel:08131555638">Call</a>

<script>
function send(){
  const name=document.getElementById("customerName").value;
  const phone=document.getElementById("customerPhone").value;
  const address=document.getElementById("customerAddress").value;

  const products=[...document.querySelectorAll('#products input:checked')]
    .map(p=>p.value).join(', ');

  const msg=`Name:${name}
Phone:${phone}
Products:${products}
Address:${address}`;

  window.open("https://wa.me/2348066673477?text="+encodeURIComponent(msg));
}
</script>
